<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登入</title>
    <style>
        body {
            margin: 0;
            font-family: "Microsoft JhengHei", sans-serif;
            background-image: url("背景圖路徑.jpg"); /* 請替換為實際圖檔名稱 */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .logo {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 120px;
        }

        .login-container {
            background-color: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 30px;
            border-radius: 20px;
            width: 400px;
            max-width: 90%;
            box-shadow: 0 0 15px #00f7c2;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        h2 {
            text-align: center;
            color: #00f7c2;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 5px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #00f7c2;
            border-radius: 5px;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #00d8a7;
            border: none;
            color: white;
            font-size: 18px;
            border-radius: 5px;
            cursor: pointer;
        }

        @media screen and (max-width: 480px) {
            .login-container {
                width: 90%;
                padding: 20px;
                top: 60%;
                transform: translate(-50%, -60%);
            }

            h2 {
                font-size: 22px;
            }

            input[type="text"],
            input[type="password"] {
                font-size: 14px;
                padding: 10px;
            }

            button {
                font-size: 16px;
                padding: 10px;
            }

            .logo {
                width: 100px;
                top: 15px;
                left: 15px;
            }
        }
    </style>
</head>
<body>
    <img src="logo路徑.png" alt="公司LOGO" class="logo"> <!-- 請替換為實際logo檔名 -->
    <div class="login-container">
        <h2>登入</h2>
        <form action="/login" method="post">
            <label for="phone">手機號碼</label>
            <input type="text" id="phone" name="phone" placeholder="請輸入手機號碼" required>

            <label for="password">密碼</label>
            <input type="password" id="password" name="password" placeholder="請輸入密碼" required>

            <button type="submit">登入</button>
        </form>
    </div>
</body>
</html>
