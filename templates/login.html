<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登入</title>
  <style>
    body, html {
      height: 100%;
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: url('/static/bg.jpg') no-repeat center center fixed;
      background-size: cover;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .logo {
      margin-top: 30px;
      width: 160px;
      max-width: 40%;
    }

    .login-container {
      margin-top: 30px;
      background: rgba(0, 0, 0, 0.6);
      padding: 30px 20px;
      border-radius: 20px;
      box-shadow: 0 0 20px #0ff;
      width: 90%;
      max-width: 400px;
      color: white;
    }

    h2 {
      text-align: center;
      color: #00f7d1;
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-top: 15px;
    }

    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border: 1px solid #00f7d1;
      border-radius: 5px;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 20px;
      background-color: #00d8a7;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 18px;
      cursor: pointer;
    }

    button:hover {
      background-color: #00c39d;
    }
  </style>
</head>
<body>
  <img src="/static/logo.png" alt="Logo" class="logo">

  <div class="login-container">
    <h2>登入</h2>
    <form action="/login" method="post">
      <label for="phone">手機號碼</label>
      <input type="text" id="phone" name="phone" placeholder="請輸入手機號碼" required>

      <label for="password">密碼</label>
      <input type="password" id="password" name="password" placeholder="請輸入密碼" required>

      <button type="submit">登入</button>
    </form>
  </div>
</body>
</html>
